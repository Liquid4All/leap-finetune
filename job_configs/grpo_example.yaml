# Text GRPO quickstart — single-node, colocated vLLM, GSM8K reward.
#
# Same `messages` parquet drives sft / dpo / grpo. In grpo mode the
# loader splits each row's messages into `prompt` (non-assistant turns)
# and `solution` (last assistant text); the GSM8K reward extracts the
# `#### N` answer from the assistant turn. No preprocessing needed.
#
# Launch:
#   uv run leap-finetune job_configs/grpo_example.yaml
#   sbatch job_configs/slurms/grpo_example.sh

project_name: "grpo_example"
model_name: "LFM2-1.2B"
training_type: "grpo"

dataset:
  path: "your-org/your-gsm8k-parquet"   # replace with your HF id or local parquet
  type: "grpo"
  limit: 2000                           # remove for full-dataset training

rewards:
  recipe: "./rewards/tasks/gsm8k/recipe.py::GSM8KRecipe"

training_config:
  extends: "DEFAULT_GRPO"
  num_train_epochs: 1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 1e-6
  num_generations: 8
  max_completion_length: 768
  vllm_gpu_memory_utilization: 0.3
  vllm_enable_sleep_mode: true
