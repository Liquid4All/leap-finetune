project_name: "long_context_moe_sft"
model_name: "LFM2-24B-A2B"
training_type: "moe_sft"

# YaRN RoPE scaling: extend 32k base context to 64k.
model_config:
  rope_scaling:
    rope_type: "yarn"
    factor: 2.0
    original_max_position_embeddings: 32768
    beta_fast: 32
    beta_slow: 1
  max_position_embeddings: 65536

dataset:
  path: "HuggingFaceTB/smoltalk"
  type: "sft"
  limit: 1000
  test_size: 0.2
  subset: "all"

ray:
  num_workers: 8

training_config:
  extends: "MOE_LARGE_SFT"
  max_length: 65536
  packing: true
  padding_free: true
  context_parallel_size: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1e-5
  save_strategy: "steps"
  save_steps: 100
  eval_strategy: "steps"
  eval_steps: 100

  moe_training:
    aux_loss_coef: 0.01
    z_loss_coef: 0.001
    router_lr_ratio: 0.1
    expert_parallel_size: 1

peft_config:
  use_peft: false
