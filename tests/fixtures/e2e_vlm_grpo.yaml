project_name: "e2e_vlm_grpo"
model_name: "LFM2-VL-1.6B"
training_type: "vlm_grpo"

dataset:
  path: "alay2shah/example-vlm-sft-dataset"
  type: "vlm_grpo"
  limit: 8

# No rl_env — use a simple length reward so the test doesn't need Docker/HF Space
rewards:
  funcs:
    - "./rewards/length.py::length_reward"
  weights: [1.0]

training_config:
  extends: "DEFAULT_VLM_GRPO"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1e-6
  num_generations: 2
  max_completion_length: 16
  save_strategy: "no"
  eval_strategy: "no"
  logging_steps: 1
  vllm_mode: "colocate"
  vllm_gpu_memory_utilization: 0.25
  vllm_enable_sleep_mode: true

peft_config:
  use_peft: false
