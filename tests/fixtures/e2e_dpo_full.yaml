project_name: "e2e_dpo_full"
model_name: "LFM2-1.2B"
training_type: "dpo"

dataset:
  path: "mlabonne/orpo-dpo-mix-40k"
  type: "dpo"
  limit: 500
  test_size: 0.2
  subset: "default"

training_config:
  extends: "DEFAULT_DPO"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  learning_rate: 1e-6
  gradient_checkpointing: true
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 5

peft_config:
  use_peft: false
