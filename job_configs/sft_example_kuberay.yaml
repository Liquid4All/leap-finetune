project_name: "my_sft_kuberay"
model_name: "LFM2-1.2B"
training_type: "sft"

dataset:
  path: "HuggingFaceTB/smoltalk"
  type: "sft"
  limit: 1000
  test_size: 0.2
  subset: "all"

training_config:
  extends: "DEFAULT_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  learning_rate: 2e-5

peft_config:
  extends: "DEFAULT_LORA"
  use_peft: true

kuberay:
  image: "your-registry.com/leap-finetune:latest"
  gpu_count: 4
  gpu_type: "nvidia.com/gpu"
  namespace: "default"
  cpu: 8
  memory: "64Gi"
  output_pvc: "training-outputs"
  output_dir: "/outputs"
  env:
    HF_TOKEN: "hf_your_token_here"
