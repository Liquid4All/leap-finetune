project_name: "my_moe_dpo_project"
model_name: "LFM2-8B-A1B"
training_type: "dpo"

dataset:
  path: "mlabonne/orpo-dpo-mix-40k"
  type: "dpo"
  limit: 1000
  test_size: 0.2
  subset: "default"

training_config:
  extends: "MOE_DPO"
  num_train_epochs: 2
  per_device_train_batch_size: 2
  learning_rate: 1e-6

peft_config:
  extends: "MOE_LORA"
  use_peft: true
