[project]
name = "leap-finetune"
version = "0.1.0"
description = "A minimal fine-tuning repo for LFM2, fully built on Open Source."
readme = "README.md"
authors = [
    { name = "Liquid AI", email = "support@liquid.ai" }
]
requires-python = ">=3.12"
dependencies = [
    "accelerate>=1.7.0",
    "peft>=0.15.2",
    "deepspeed>=0.17.1",
    "torch>=2.7.1",
    "transformers>=5.1.0",
    "flash-attn>=2.8.0",
    "numpy>=2.2.0",
    "trl>=0.18.2",
    "rich>=14.1.0",
    "pillow>=11.3.0",
    "mpi4py>=4.1.0",
    "liger-kernel>=0.6.2",
    "wandb>=0.22.3",
    "ray==2.48.0",
    "pyyaml>=6.0",
    "turm>=0.13.0",
    "torchvision>=0.24.1",
]

[project.optional-dependencies]
lmms-eval = ["lmms_eval"]
lmms-eval-vllm = ["lmms_eval", "vllm"]

[project.scripts]
leap-finetune = "leap_finetune:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
no-build-isolation-package = ["flash-attn"]
override-dependencies = [
    "transformers==5.1.0",
    "torch==2.10.0",
    "torchvision==0.25.0",
]

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[tool.uv.sources]
lmms_eval = { git = "ssh://git@github.com/Liquid4All/lmms-eval.git" }
vllm = { git = "ssh://git@github.com/Liquid4All/vllm.git" }
torch = [{ index = "pytorch-cu129" }]
torchvision = [{ index = "pytorch-cu129" }]

[tool.uv.extra-build-variables]
vllm = { VLLM_USE_PRECOMPILED = "1", VLLM_PRECOMPILED_WHEEL_COMMIT = "f5972a872fa3fabd94b7a6c6f031f4b5bcee2b2d", VLLM_PRECOMPILED_WHEEL_VARIANT = "cu129", VLLM_VERSION_OVERRIDE = "0.16.0rc2.dev441+gf5972a872", VLLM_ROCM_WHEEL_INDEX = "https://pypi.amd.com/vllm-rocm/simple" }

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
    "pytest>=8.0",
    "ruff>=0.11.13",
]
