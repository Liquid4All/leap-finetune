project_name: "e2e_sft_full"
model_name: "LFM2-1.2B"
training_type: "sft"

dataset:
  path: "HuggingFaceTB/smoltalk"
  type: "sft"
  limit: 500
  test_size: 0.2
  subset: "all"

training_config:
  extends: "DEFAULT_SFT"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  learning_rate: 2e-5
  gradient_checkpointing: true
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 5

peft_config:
  use_peft: false
