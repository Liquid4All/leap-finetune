# Text GRPO with an OpenEnv environment as the reward source.
#
# Uses the hosted echo_env Space (`qgallouedec/echo_env`) — a minimal
# OpenEnv environment that scores each completion with a simple
# length-based reward. Runs remotely over HTTPS so no Docker is
# required.
#
# Prerequisites:
#   uv sync --extra rl-env
#
# Launch:
#   uv run leap-finetune job_configs/grpo_openenv_example.yaml
#
# Per-sample flow:
#   1. TRL rolls out a completion with vLLM.
#   2. The adapter calls `env.step({"message": <completion text>})`
#      on the remote OpenEnv server.
#   3. The server returns a reward, which the adapter forwards as
#      `env_reward=...` on the rollout dict.
#   4. The auto-prepended `env_reward` reward function reads that
#      kwarg and contributes it to GRPO's group-relative advantage.
#
# Any reward functions you list under `rewards:` are stacked on top of
# the environment reward (env_reward gets weight 1.0 by default).

project_name: "grpo_openenv_echo"
model_name: "LFM2-1.2B"
training_type: "grpo"

dataset:
  path: "your-org/your-prompts-parquet"   # any GRPO-compatible parquet with a `prompt` column
  type: "grpo"
  limit: 500

rl_env:
  source: "qgallouedec/echo_env"
  base_url: "https://qgallouedec-echo-env.hf.space"  # skip Docker, talk to the hosted Space
  skip_install: true
  action_key: "message"                              # matches the env's action schema

# Optional: stack extra file-based rewards on top of the env reward.
# Weights apply to [env_reward, *funcs] in order.
# rewards:
#   funcs:
#     - "./rewards/length.py::length_reward"
#   weights: [1.0, 0.1]

training_config:
  extends: "DEFAULT_GRPO"
  num_train_epochs: 1
  per_device_train_batch_size: 8
  learning_rate: 1e-6
  num_generations: 8
  max_completion_length: 256
  vllm_gpu_memory_utilization: 0.3
  vllm_enable_sleep_mode: true
