project_name: "my_vlm_project"
model_name: "LFM2-1.2B"
training_type: "vlm_sft"

dataset:
  path: "alay2shah/example-vlm-sft-dataset"
  type: "vlm_sft"
  limit: null
  test_size: 0.2
  # image_root: "/path/to/images"  # prepended to relative image paths (optional)

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  learning_rate: 1e-5
  # vision_encoder_lr_multiplier: 0.1  # fraction of base LR for vision encoder (default: 0.1)

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true
