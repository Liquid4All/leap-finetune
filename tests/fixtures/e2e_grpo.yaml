project_name: "e2e_grpo"
model_name: "LFM2-1.2B"
training_type: "grpo"

dataset:
  path: "trl-lib/DeepMath-103K"
  type: "grpo"
  limit: 16                      # smallest viable for num_generations=2 on 1 GPU

rewards:
  funcs:
    - "./rewards/length.py::length_reward"
  weights: [1.0]

training_config:
  extends: "DEFAULT_GRPO"
  # Single optimizer step is enough to verify the wiring works end-to-end
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  steps_per_generation: 2
  learning_rate: 1e-6
  num_generations: 2             # tiny group size for the smoke test
  max_completion_length: 16
  save_strategy: "no"
  eval_strategy: "no"
  logging_steps: 1
  # Inherit DEFAULT_GRPO use_vllm: true so the smoke test covers the shipped
  # rollout path with vLLM 0.19 + the Transformers override in pyproject.toml.

peft_config:
  use_peft: false
