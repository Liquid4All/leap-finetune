project_name: "my_vlm_dpo_project"
model_name: "LFM2-VL-1.6B"
training_type: "vlm_dpo"

dataset:
  path: "/path/to/vlm_dpo_dataset.jsonl"
  type: "vlm_dpo"
  limit: null
  test_size: 0.2
  # image_root: "/path/to/images"  # prepended to relative image paths (optional)

training_config:
  extends: "DEFAULT_VLM_DPO"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5e-7
  # freeze_vision_encoder: true  # optional
  # optimizer_type: "adamw_8bit"  # optional, uses bitsandbytes

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true
